<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Art By KIRAN GURUNG</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #faf7f2;
      color: #222;
    }

    header {
      text-align: center;
      padding: 60px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #666;
    }

    nav {
      text-align: center;
      margin-bottom: 30px;
    }

    nav a {
      margin: 10px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }

    section {
      padding: 40px;
    }

    h2 {
      border-bottom: 1px solid #ddd;
      padding-bottom: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    }

    .card img {
      width: 100%;
      border-radius: 12px;
      height: 200px;
      object-fit: cover;
    }

    footer {
      text-align: center;
      padding: 50px;
      color: #888;
    }
  </style>
</head>

<body>

<header>
  <h1>Kiran Gurung</h1>
  <p>Portraits • Murals • Handmade Art • Tikuli Studio</p>
</header>

<nav>
  <a href="#gallery">Gallery</a>
  <a href="#commissions">Commissions</a>
  <a href="#contact">Contact</a>
</nav>

<!-- GALLERY -->
<section id="gallery">
  <h2>Artworks</h2>

  <div class="grid">

    <div class="card">
      <img src="IMG_1568.jpeg">
    </div>

    <div class="card">
      <img src="IMG_1569.jpeg">
    </div>

    <div class="card">
      <img src="IMG_1570.jpeg">
    </div>

    <div class="card">
      <img src="IMG_1571.jpeg">
    </div>

    <div class="card">
      <img src="IMG_1572.jpeg">
    </div>

    <div class="card">
      <img src="IMG_1573.jpeg">
    </div>

  </div>
</section>

<!-- COMMISSIONS -->
<section id="commissions">
  <h2>Commissions</h2>
  <p>Custom portraits, murals, and handmade artworks available on request.</p>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <p>Email: your-email@example.com</p>
  <p>Instagram: @tikuli_handmade</p>
</section>

<footer>
  © 2026 Kiran Gurung Art Studio
</footer>

</body>
</html>
