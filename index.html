<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Art by Kiran Gurung</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f6f3ef;
  color:#111;
}

/* HERO */
.hero{
  height:85vh;
  background:url("IMG_3446.jpeg") center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
}

.hero-box{
  background:rgba(0,0,0,0.4);
  padding:30px;
  border-radius:12px;
}

.hero h1{
  font-size:50px;
  margin:0;
}

.hero p{
  margin-top:10px;
}

/* SECTION */
section{
  padding:60px 20px;
}

h2{
  text-align:center;
  margin-bottom:30px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  text-decoration:none;
  color:black;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* IMAGE */
.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

/* INFO */
.info{
  padding:15px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-box">
    <h1>ART BY KIRAN GURUNG</h1>
    <p>Portraits • Murals • Digital Art • Online Classes</p>
  </div>
</div>

<!-- CATEGORIES -->
<section>
<h2>Explore My Work</h2>

<div class="grid">

<a href="portraits.html" class="card">
<img src="IMG_3446.jpeg">
<div class="info">Portraits</div>
</a>

<a href="murals.html" class="card">
<img src="IMG_1574.jpeg">
<div class="info">Murals</div>
</a>

<a href="digital.html" class="card">
<img src="IMG_1607.jpeg">
<div class="info">Digital Art</div>
</a>

<a href="calendars.html" class="card">
<img src="IMG_1573.jpeg">
<div class="info">Calendars</div>
</a>

<a href="classes.html" class="card">
<img src="IMG_3452.jpeg">
<div class="info">Online Classes</div>
</a>

</div>
</section>

</body>
</html>
