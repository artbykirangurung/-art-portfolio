<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Art By Kiran Gurung</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f6f3ef;
  color: #1a1a1a;
}

/* HERO */
.hero {
  height: 70vh;
  background: url('IMG_3468.jpeg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

.hero h1 {
  font-size: 60px;
}

/* NAV */
nav {
  text-align: center;
  padding: 20px;
  background: white;
}

nav a {
  margin: 0 12px;
  text-decoration: none;
  color: #333;
}

/* SECTION */
section {
  padding: 60px 30px;
}

h2 {
  text-align: center;
  margin-bottom: 30px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

/* CARD */
.card {
  background: white;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
}

/* SLIDER */
.slider {
  position: relative;
  overflow: hidden;
}

.slides {
  display: flex;
  width: 500%;
  animation: slide 15s infinite;
}

.slides img {
  width: 100%;
  height: 260px;
  object-fit: cover;
}

/* SLIDE ANIMATION (5 images support) */
@keyframes slide {
  0% { transform: translateX(0%); }
  20% { transform: translateX(0%); }

  25% { transform: translateX(-100%); }
  40% { transform: translateX(-100%); }

  45% { transform: translateX(-200%); }
  60% { transform: translateX(-200%); }

  65% { transform: translateX(-300%); }
  80% { transform: translateX(-300%); }

  85% { transform: translateX(-400%); }
  100% { transform: translateX(-400%); }
}

/* INFO */
.info {
  padding: 12px;
}

.price {
  font-weight: bold;
  margin-top: 5px;
}

/* BUTTON */
button {
  margin-top: 8px;
  padding: 10px;
  width: 100%;
  border: none;
  background: #111;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 40px;
  color: #777;
}
</style>
</head>

<body>

<div class="hero">
  <h1>ART BY KIRAN GURUNG</h1>
</div>

<nav>
  <a href="#commission">Commission</a>
</nav>

<!-- COMMISSION SECTION -->
<section id="commission">
<h2>Commission Portraits</h2>

<div class="grid">

<!-- SINGLE PORTRAIT -->
<div class="card">
  <div class="slider">
    <div class="slides">
      <img src="IMG_3446.jpeg">
      <img src="IMG_3447.jpeg">
      <img src="IMG_3452.jpeg">
      <img src="IMG_3454.jpeg">
      <img src="IMG_3455.jpeg">
    </div>
  </div>
  <div class="info">
    <div>Single Portrait</div>
    <div class="price">Custom Commission</div>
    <button>Request</button>
  </div>
</div>

<!-- COUPLE / FAMILY OF 2 -->
<div class="card">
  <div class="slider">
    <div class="slides">
      <img src="IMG_3449.jpeg">
      <img src="IMG_3450.jpeg">
      <img src="IMG_3451.jpeg">
      <img src="IMG_3463.jpeg">
      <img src="IMG_3462.jpeg">
    </div>
  </div>
  <div class="info">
    <div>Couple / Family of 2</div>
    <div class="price">Custom Commission</div>
    <button>Request</button>
  </div>
</div>

<!-- FAMILY OF 3 -->
<div class="card">
  <div class="slider">
    <div class="slides">
      <img src="IMG_3455.jpeg">
      <img src="IMG_3456.jpeg">
      <img src="IMG_3457.jpeg">
      <img src="IMG_3458.jpeg">
      <img src="IMG_3459.jpeg">
    </div>
  </div>
  <div class="info">
    <div>Family of 3</div>
    <div class="price">Custom Commission</div>
    <button>Request</button>
  </div>
</div>

</div>
</section>

<footer>
© 2026 Art By Kiran Gurung
</footer>

</body>
</html>
